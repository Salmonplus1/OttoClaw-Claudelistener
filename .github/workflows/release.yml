name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.5.2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build non-camera board firmware (OttoRobot AI)
        shell: bash
        run: |
          . $IDF_PATH/export.sh
          idf.py set-target esp32s3
          # Default config is non-camera board (VARIANT=1)
          idf.py build

      - name: Verify no secrets in non-camera binary
        shell: bash
        run: |
          BIN="build/ottoclaw.bin"
          echo "Checking for embedded API keys..."
          ! strings "$BIN" | grep -qE 'sk-[a-f0-9]{20,}' || { echo "ERROR: Real API key found in firmware binary!"; exit 1; }
          ! strings "$BIN" | grep -qE 'ding[a-z0-9]{10,}' || { echo "ERROR: DingTalk key found in firmware binary!"; exit 1; }
          echo "Clean — no secrets detected."

      - name: Package non-camera firmware
        shell: bash
        run: |
          . $IDF_PATH/export.sh
          VERSION="${GITHUB_REF_NAME}"
          esptool.py --chip esp32s3 merge_bin \
            --flash_mode dio --flash_size 16MB --flash_freq 80m \
            -o "ottoclaw-full-${VERSION}-ai.bin" \
            0x0      build/bootloader/bootloader.bin \
            0x8000   build/partition_table/partition-table.bin \
            0xf000   build/ota_data_initial.bin \
            0x20000  build/ottoclaw.bin \
            0x420000 build/spiffs.bin

      - name: Build camera board firmware (OttoCam519)
        shell: bash
        run: |
          . $IDF_PATH/export.sh
          # Switch to camera board variant
          sed -i 's/CONFIG_OTTOCLAW_BOARD_OTTO_AI=y/# CONFIG_OTTOCLAW_BOARD_OTTO_AI is not set/' sdkconfig
          sed -i 's/# CONFIG_OTTOCLAW_BOARD_CAM519 is not set/CONFIG_OTTOCLAW_BOARD_CAM519=y/' sdkconfig
          sed -i 's/CONFIG_OTTOCLAW_BOARD_VARIANT=1/CONFIG_OTTOCLAW_BOARD_VARIANT=2/' sdkconfig
          rm -rf build
          idf.py set-target esp32s3
          idf.py build

      - name: Verify no secrets in camera binary
        shell: bash
        run: |
          BIN="build/ottoclaw.bin"
          echo "Checking for embedded API keys..."
          ! strings "$BIN" | grep -qE 'sk-[a-f0-9]{20,}' || { echo "ERROR: Real API key found in firmware binary!"; exit 1; }
          ! strings "$BIN" | grep -qE 'ding[a-z0-9]{10,}' || { echo "ERROR: DingTalk key found in firmware binary!"; exit 1; }
          echo "Clean — no secrets detected."

      - name: Package camera firmware
        shell: bash
        run: |
          . $IDF_PATH/export.sh
          VERSION="${GITHUB_REF_NAME}"
          esptool.py --chip esp32s3 merge_bin \
            --flash_mode dio --flash_size 16MB --flash_freq 80m \
            -o "ottoclaw-full-${VERSION}-cam519.bin" \
            0x0      build/bootloader/bootloader.bin \
            0x8000   build/partition_table/partition-table.bin \
            0xf000   build/ota_data_initial.bin \
            0x20000  build/ottoclaw.bin \
            0x420000 build/spiffs.bin

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## OttoClaw ${{ github.ref_name }}

            ### ⚠️ 选择对应板型的固件！

            | 板型 | 固件文件 | 识别方式 |
            |------|---------|---------|
            | OttoRobot AI（无摄像头） | `ottoclaw-full-${{ github.ref_name }}-ai.bin` | 板上无摄像头接口 |
            | OttoCam519（带摄像头接口） | `ottoclaw-full-${{ github.ref_name }}-cam519.bin` | 板上有摄像头排线座 |

            两种板子引脚布局不同，**烧错固件会导致屏幕不亮、舵机不动！**

            ### 烧录方式 / Flashing

            **方式一：在线一键烧录（最简单，推荐新手）**

            1. 下载对应板型的固件
            2. USB 连接开发板，保持开机状态
            3. 打开 [鹿戴马在线烧录](https://www.16302.com/localinit)，芯片选 ESP系列 > 不限类型
            4. 上传固件文件（写入地址 0x0），点击"开始烧录"
            5. 按一下 EN 键重启设备

            **方式二：esptool 命令行烧录**
            ```bash
            # 无摄像头板
            esptool.py --chip esp32s3 --port PORT --baud 460800 --before default_reset --after hard_reset write_flash -z 0x0 ottoclaw-full-${{ github.ref_name }}-ai.bin

            # 摄像头板
            esptool.py --chip esp32s3 --port PORT --baud 460800 --before default_reset --after hard_reset write_flash -z 0x0 ottoclaw-full-${{ github.ref_name }}-cam519.bin
            ```
            PORT: `/dev/cu.usbmodem1101` (Mac) / `COM3` (Windows)

            ### 首次配网 / First-time Setup

            烧录完成后设备自动进入配网模式：

            **网页配网（推荐）：** 连接开发板 WiFi（名称 OttoClaw_xxxx），浏览器自动弹出配置页面。

            **串口配网：** 连接串口 (115200 baud)，输入：
            ```
            wifi <SSID> <密码>
            set_base_url <模型API地址>
            set_api_key <你的API-Key>
            set_app_key <钉钉AppKey>
            set_app_secret <钉钉AppSecret>
            reboot
            ```

            ⚠️ 本固件不含任何密钥和个人信息。
          files: |
            ottoclaw-full-${{ github.ref_name }}-ai.bin
            ottoclaw-full-${{ github.ref_name }}-cam519.bin