<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OttoClaw Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: #16213e;
            padding: 15px 20px;
            text-align: center;
            border-bottom: 1px solid #0f3460;
        }
        .header h1 {
            font-size: 20px;
            color: #e94560;
        }
        .header .status {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }
        .header .status.connected { color: #4ade80; }
        .header .status.disconnected { color: #f87171; }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.5;
            word-wrap: break-word;
            white-space: pre-wrap;
        }
        .message.user {
            align-self: flex-end;
            background: #e94560;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .message.bot {
            align-self: flex-start;
            background: #16213e;
            border: 1px solid #0f3460;
            border-bottom-left-radius: 4px;
        }
        .message.system {
            align-self: center;
            background: transparent;
            color: #666;
            font-size: 12px;
            padding: 5px;
        }
        .message .time {
            font-size: 10px;
            color: rgba(255,255,255,0.5);
            margin-top: 5px;
            text-align: right;
        }
        .message.bot .time { color: #666; }
        .input-area {
            background: #16213e;
            padding: 15px;
            display: flex;
            gap: 10px;
            border-top: 1px solid #0f3460;
        }
        .input-area input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #0f3460;
            border-radius: 24px;
            background: #1a1a2e;
            color: #eee;
            font-size: 16px;
            outline: none;
        }
        .input-area input:focus {
            border-color: #e94560;
        }
        .input-area button {
            padding: 12px 24px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 24px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .input-area button:hover { background: #d63d56; }
        .input-area button:disabled {
            background: #444;
            cursor: not-allowed;
        }
        .typing {
            display: none;
            align-self: flex-start;
            padding: 12px 16px;
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 18px;
            border-bottom-left-radius: 4px;
        }
        .typing.show { display: block; }
        .typing span {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #666;
            border-radius: 50%;
            margin: 0 2px;
            animation: bounce 1.4s infinite ease-in-out;
        }
        .typing span:nth-child(1) { animation-delay: -0.32s; }
        .typing span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>OttoClaw</h1>
        <div class="status disconnected" id="status">Connecting...</div>
        <a href="/settings.html" style="position: absolute; top: 15px; right: 20px; color: #e94560; text-decoration: none; font-size: 20px;">⚙️</a>
    </div>
    
    <div class="messages" id="messages">
        <div class="message system">Welcome to OttoClaw Chat</div>
    </div>
    
    <div class="typing" id="typing">
        <span></span><span></span><span></span>
    </div>
    
    <div class="input-area">
        <input type="text" id="input" placeholder="Type a message..." autocomplete="off">
        <button id="send" onclick="sendMessage()">Send</button>
    </div>

    <script>
        // Persist chatId across page refreshes so session history is preserved
        let chatId = localStorage.getItem('ottoclaw_chat_id') || localStorage.getItem('mimi_chat_id');
        if (!chatId) {
            chatId = 'web_' + Math.random().toString(36).substr(2, 9);
        }
        localStorage.setItem('ottoclaw_chat_id', chatId);
        }
        let ws = null;
        let reconnectTimer = null;
        
        function connect() {
            const host = window.location.host;
            ws = new WebSocket('ws://' + host + '/ws');
            
            ws.onopen = function() {
                document.getElementById('status').textContent = 'Connected';
                document.getElementById('status').className = 'status connected';
                document.getElementById('send').disabled = false;
                addMessage('system', 'Connected to OttoClaw');
            };
            
            ws.onclose = function() {
                document.getElementById('status').textContent = 'Disconnected';
                document.getElementById('status').className = 'status disconnected';
                document.getElementById('send').disabled = true;
                hideTyping();
                // Reconnect after 3 seconds
                reconnectTimer = setTimeout(connect, 3000);
            };
            
            ws.onerror = function(err) {
                console.error('WebSocket error:', err);
            };
            
            ws.onmessage = function(event) {
                hideTyping();
                try {
                    const data = JSON.parse(event.data);
                    if (data.type === 'response' && data.content) {
                        addMessage('bot', data.content);
                    }
                } catch (e) {
                    addMessage('bot', event.data);
                }
            };
        }
        
        function sendMessage() {
            const input = document.getElementById('input');
            const text = input.value.trim();
            if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
            
            addMessage('user', text);
            showTyping();
            
            ws.send(JSON.stringify({
                type: 'message',
                content: text,
                chat_id: chatId
            }));
            
            input.value = '';
            input.focus();
        }
        
        function addMessage(type, text) {
            const messages = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = 'message ' + type;
            
            const now = new Date();
            const time = now.getHours().toString().padStart(2,'0') + ':' + 
                        now.getMinutes().toString().padStart(2,'0');
            
            if (type === 'system') {
                div.textContent = text;
            } else {
                div.innerHTML = text.replace(/</g, '&lt;').replace(/>/g, '&gt;')
                    .replace(/\n/g, '<br>') + 
                    '<div class="time">' + time + '</div>';
            }
            
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }
        
        function showTyping() {
            document.getElementById('typing').classList.add('show');
            const messages = document.getElementById('messages');
            messages.scrollTop = messages.scrollHeight;
        }
        
        function hideTyping() {
            document.getElementById('typing').classList.remove('show');
        }
        
        // Enter key to send
        document.getElementById('input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMessage();
        });
        
        // Start connection
        connect();
    </script>
</body>
</html>
