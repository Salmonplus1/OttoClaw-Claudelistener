<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OttoClaw Settings</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            padding: 20px;
        }
        .header {
            background: #16213e;
            padding: 15px 20px;
            text-align: center;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        .header h1 {
            font-size: 20px;
            color: #e94560;
        }
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #e94560;
            text-decoration: none;
            font-size: 24px;
        }
        .container {
            max-width: 680px;
            margin: 0 auto;
        }
        .section {
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
        }
        .section h2 {
            font-size: 16px;
            color: #e94560;
            margin-bottom: 15px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            font-size: 14px;
            color: #888;
            margin-bottom: 5px;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            background: #1a1a2e;
            border: 1px solid #0f3460;
            border-radius: 8px;
            color: #eee;
            font-size: 14px;
        }
        .form-group input:focus {
            outline: none;
            border-color: #e94560;
        }
        .form-group .hint {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }
        .btn {
            width: 100%;
            padding: 12px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn:hover {
            background: #d63d56;
        }
        .btn-secondary {
            background: #0f3460;
        }
        .btn-secondary:hover {
            background: #16213e;
        }
        .status {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
        }
        .status.success {
            background: rgba(74, 222, 128, 0.2);
            border: 1px solid #4ade80;
            color: #4ade80;
        }
        .status.error {
            background: rgba(248, 113, 113, 0.2);
            border: 1px solid #f87171;
            color: #f87171;
        }
        .current-info {
            background: #0f3460;
            padding: 10px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 10px;
            line-height: 1.6;
        }
        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 10px;
        }
        .status-pill {
            background: #1a1a2e;
            border: 1px solid #0f3460;
            border-radius: 8px;
            padding: 10px;
        }
        .status-pill strong {
            display: block;
            color: #e94560;
            margin-bottom: 6px;
            font-size: 13px;
        }
        .mono {
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        }
    </style>
</head>
<body>
    <a href="/" class="back-btn">←</a>

    <div class="container">
        <div class="header">
            <h1>OttoClaw Settings · 闪猫科技</h1>
        </div>

        <div id="status" class="status"></div>

        <div class="section">
            <h2>当前状态</h2>
            <div class="status-grid">
                <div class="status-pill"><strong>接入热点</strong><span id="ap-ssid" class="mono">Loading...</span></div>
                <div class="status-pill"><strong>WiFi</strong><span id="wifi-state">Loading...</span></div>
                <div class="status-pill"><strong>LLM</strong><span id="llm-state">Loading...</span></div>
                <div class="status-pill"><strong>钉钉</strong><span id="dingtalk-state">Loading...</span></div>
            </div>
        </div>

        <div class="section">
            <h2>WiFi 配置</h2>
            <div class="current-info" id="current-wifi">
                当前 WiFi: <span id="wifi-ssid">Loading...</span>
            </div>
            <div class="form-group">
                <label>WiFi SSID</label>
                <input type="text" id="wifi_ssid" placeholder="WiFi 名称">
            </div>
            <div class="form-group">
                <label>WiFi Password</label>
                <input type="password" id="wifi_pass" placeholder="WiFi 密码">
                <div class="hint">留空则不修改密码</div>
            </div>
            <button class="btn" onclick="saveWiFi()">保存 WiFi 配置</button>
        </div>

        <div class="section">
            <h2>代理与搜索</h2>
            <div class="current-info" id="current-proxy">
                当前代理: <span id="proxy-addr">Loading...</span><br>
                搜索 Key: <span id="search-state">Loading...</span>
            </div>
            <div class="form-group">
                <label>代理地址</label>
                <input type="text" id="proxy_host" placeholder="192.168.1.100">
            </div>
            <div class="form-group">
                <label>代理端口</label>
                <input type="text" id="proxy_port" placeholder="7890">
            </div>
            <button class="btn" onclick="saveProxy()">保存代理配置</button>
            <div class="form-group" style="margin-top:16px;">
                <label>搜索 API Key（百炼/DashScope）</label>
                <input type="password" id="search_key" placeholder="sk-...">
            </div>
            <button class="btn btn-secondary" onclick="saveSearch()">保存搜索 Key</button>
        </div>

        <div class="section">
            <h2>系统操作</h2>
            <button class="btn btn-secondary" onclick="goToSetup()">打开完整配置页</button>
            <button class="btn btn-secondary" onclick="rebootDevice()">重启设备</button>
        </div>

        <div style="text-align: center; color: #666; font-size: 12px; margin-top: 20px;">
            OttoClaw v1.0 · 闪猫科技
        </div>
    </div>

    <script>
        function showStatus(message, type) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = 'status ' + type;
            status.style.display = 'block';
            setTimeout(() => {
                status.style.display = 'none';
            }, 3000);
        }

        async function api(path, body) {
            const res = await fetch(path, body ? {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            } : {});
            return res.json();
        }

        function yesNo(v) {
            return v ? '已配置' : '未配置';
        }

        async function loadCurrentSettings() {
            try {
                const data = await api('/api/status');
                const wifi = data.wifi || {};
                const llm = data.llm || {};
                const dingtalk = data.dingtalk || {};
                const proxy = data.proxy || {};
                const search = data.search || {};

                document.getElementById('ap-ssid').textContent = data.ap_ssid || 'Unknown';
                document.getElementById('wifi-state').textContent = wifi.configured ? (wifi.ssid || '已配置') : '未配置';
                document.getElementById('llm-state').textContent = llm.configured ? `${llm.provider || 'LLM'} / ${llm.model || ''}` : '未配置';
                document.getElementById('dingtalk-state').textContent = yesNo(dingtalk.configured);
                document.getElementById('search-state').textContent = yesNo(search.configured);

                document.getElementById('wifi-ssid').textContent = wifi.ssid || '未配置';
                document.getElementById('proxy-addr').textContent = proxy.host ? `${proxy.host}:${proxy.port || ''}` : '未配置';

                document.getElementById('wifi_ssid').value = wifi.ssid || '';
                document.getElementById('proxy_host').value = proxy.host || '';
                document.getElementById('proxy_port').value = proxy.port || '';
                document.getElementById('search_key').value = search.key || '';
            } catch (err) {
                console.error('Failed to load settings:', err);
                showStatus('加载设置失败: ' + err.message, 'error');
            }
        }

        async function saveWiFi() {
            const ssid = document.getElementById('wifi_ssid').value.trim();
            const pass = document.getElementById('wifi_pass').value;
            if (!ssid) {
                showStatus('请输入 WiFi SSID', 'error');
                return;
            }
            try {
                const data = await api('/api/wifi/connect', { ssid, password: pass });
                if (data.ok) {
                    showStatus(data.msg || 'WiFi 配置已保存', 'success');
                    document.getElementById('wifi_pass').value = '';
                    loadCurrentSettings();
                } else {
                    showStatus('保存失败: ' + (data.msg || 'Unknown error'), 'error');
                }
            } catch (err) {
                showStatus('保存失败: ' + err.message, 'error');
            }
        }

        async function saveProxy() {
            const host = document.getElementById('proxy_host').value.trim();
            const port = document.getElementById('proxy_port').value.trim();
            try {
                const data = await api('/api/proxy/config', { host, port });
                if (data.ok) {
                    showStatus(data.msg || '代理配置已保存', 'success');
                    loadCurrentSettings();
                } else {
                    showStatus('保存失败: ' + (data.msg || 'Unknown error'), 'error');
                }
            } catch (err) {
                showStatus('保存失败: ' + err.message, 'error');
            }
        }

        async function saveSearch() {
            const search_key = document.getElementById('search_key').value.trim();
            try {
                const data = await api('/api/search/config', { search_key });
                if (data.ok) {
                    showStatus(data.msg || '搜索 Key 已保存', 'success');
                    loadCurrentSettings();
                } else {
                    showStatus('保存失败: ' + (data.msg || 'Unknown error'), 'error');
                }
            } catch (err) {
                showStatus('保存失败: ' + err.message, 'error');
            }
        }

        async function rebootDevice() {
            if (!confirm('确定要重启设备吗？')) return;
            try {
                const data = await api('/api/system/reboot', {});
                if (data && (data.ok || data.success)) {
                    showStatus('设备正在重启...', 'success');
                    setTimeout(() => { window.location.href = '/'; }, 5000);
                } else {
                    showStatus('重启失败', 'error');
                }
            } catch (err) {
                showStatus('操作失败: ' + err.message, 'error');
            }
        }

        function goToSetup() {
            window.location.href = '/setup.html';
        }

        loadCurrentSettings();
    </script>
</body>
</html>
