<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OttoClaw Setup</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 28px;
            color: #e94560;
            margin-bottom: 10px;
        }
        .header p {
            color: #888;
            font-size: 14px;
        }
        .card {
            background: #16213e;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #0f3460;
        }
        .card h2 {
            font-size: 18px;
            color: #e94560;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .card h2 .status {
            font-size: 12px;
            padding: 2px 8px;
            border-radius: 10px;
            margin-left: auto;
        }
        .card h2 .status.done {
            background: #4ade80;
            color: #065f46;
        }
        .card h2 .status.pending {
            background: #f87171;
            color: #991b1b;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #aaa;
            font-size: 14px;
        }
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            background: #0f3460;
            border: 1px solid #1a1a2e;
            border-radius: 8px;
            color: #eee;
            font-size: 14px;
        }
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #e94560;
        }
        .form-group .hint {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }
        .btn {
            width: 100%;
            padding: 12px;
            background: #e94560;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn:hover {
            background: #d63850;
        }
        .btn:disabled {
            background: #666;
            cursor: not-allowed;
        }
        .btn-secondary {
            background: #0f3460;
        }
        .btn-secondary:hover {
            background: #1a1a2e;
        }
        .wifi-list {
            max-height: 200px;
            overflow-y: auto;
            margin-bottom: 15px;
        }
        .wifi-item {
            padding: 12px;
            background: #0f3460;
            border-radius: 8px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .wifi-item:hover {
            background: #1a1a2e;
        }
        .wifi-item.selected {
            background: #e94560;
        }
        .wifi-item .ssid {
            font-weight: 600;
            margin-bottom: 4px;
        }
        .wifi-item .signal {
            font-size: 12px;
            color: #888;
        }
        .loading {
            text-align: center;
            padding: 20px;
            color: #888;
        }
        .error {
            background: #7f1d1d;
            color: #fecaca;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .success {
            background: #065f46;
            color: #d1fae5;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .complete-btn {
            background: #4ade80;
            color: #065f46;
        }
        .complete-btn:hover {
            background: #22c55e;
        }
        .reset-btn {
            background: #f87171;
            color: #991b1b;
        }
        .reset-btn:hover {
            background: #ef4444;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>OttoClaw Setup · 闪猫科技研发</h1>
            <p>配置您的OttoClaw机器人</p>
        </div>

        <div id="status"></div>

        <div class="card">
            <h2>
                WiFi配置
                <span class="status" id="wifi-status">待配置</span>
            </h2>
            <div id="wifi-scan-section">
                <button class="btn btn-secondary" onclick="scanWiFi()">扫描WiFi网络</button>
                <div id="wifi-list" class="wifi-list"></div>
            </div>
            <div id="wifi-config-section" style="display: none;">
                <div class="form-group">
                    <label>WiFi名称</label>
                    <input type="text" id="wifi-ssid" readonly>
                </div>
                <div class="form-group">
                    <label>WiFi密码</label>
                    <input type="password" id="wifi-password" placeholder="请输入WiFi密码">
                </div>
                <button class="btn" onclick="connectWiFi()">连接WiFi</button>
                <button class="btn btn-secondary" onclick="cancelWiFi()" style="margin-top: 10px;">取消</button>
            </div>
        </div>

        <div class="card">
            <h2>
                LLM配置
                <span class="status" id="llm-status">待配置</span>
            </h2>
            <div class="form-group">
                <label>提供商</label>
                <select id="llm-provider">
                    <option value="anthropic">Anthropic (Claude)</option>
                    <option value="openai">OpenAI</option>
                    <option value="qwen">阿里云通义千问</option>
                    <option value="zhipu">智谱AI</option>
                    <option value="moonshot">Moonshot</option>
                </select>
            </div>
            <div class="form-group">
                <label>API Key</label>
                <input type="password" id="llm-api-key" placeholder="请输入API Key">
                <div class="hint">这是必填项，用于访问大模型API</div>
            </div>
            <div class="form-group">
                <label>模型名称</label>
                <input type="text" id="llm-model" placeholder="例如: claude-sonnet-4-6-20250514">
            </div>
            <div class="form-group">
                <label>Base URL (可选)</label>
                <input type="text" id="llm-base-url" placeholder="自定义API地址">
            </div>
            <button class="btn" onclick="saveLLM()">保存LLM配置</button>
        </div>

        <div class="card">
            <h2>
                钉钉配置
                <span class="status" id="dingtalk-status">待配置</span>
            </h2>
            <div class="form-group">
                <label>App Key</label>
                <input type="text" id="dingtalk-app-key" placeholder="请输入钉钉App Key">
                <div class="hint">从钉钉开放平台获取</div>
            </div>
            <div class="form-group">
                <label>App Secret</label>
                <input type="password" id="dingtalk-app-secret" placeholder="请输入钉钉App Secret">
            </div>
            <button class="btn" onclick="saveDingTalk()">保存钉钉配置</button>
        </div>

        <div class="card">
            <h2>配置信息</h2>
            <div id="config-info">
                <div class="form-group">
                    <label>WiFi</label>
                    <div id="config-wifi" style="color: #888;">未配置</div>
                </div>
                <div class="form-group">
                    <label>LLM</label>
                    <div id="config-llm" style="color: #888;">未配置</div>
                </div>
                <div class="form-group">
                    <label>钉钉</label>
                    <div id="config-dingtalk" style="color: #888;">未配置</div>
                </div>
            </div>
        </div>

        <div class="card">
            <h2>对话测试</h2>
            <div id="chat-container" style="height: 300px; overflow-y: auto; background: #0f3460; border-radius: 8px; padding: 15px; margin-bottom: 15px;">
                <div id="chat-messages"></div>
            </div>
            <div class="form-group">
                <input type="text" id="chat-input" placeholder="输入消息测试对话..." onkeypress="if(event.key==='Enter') sendChat()">
            </div>
            <button class="btn" onclick="sendChat()">发送</button>
        </div>

        <div class="card">
            <h2>完成配置</h2>
            <p style="color: #888; margin-bottom: 15px;">完成所有配置后，点击下方按钮重启设备</p>
            <button class="btn complete-btn" id="complete-btn" onclick="completeSetup()" disabled>完成配置并重启</button>
        </div>

        <div class="card">
            <h2>重置配置</h2>
            <p style="color: #888; margin-bottom: 15px;">如需重新配置，点击下方按钮清除所有设置</p>
            <button class="btn reset-btn" onclick="resetConfig()">重置所有配置</button>
        </div>
    </div>

    <script>
        const API_BASE = '/api';

        async function checkStatus() {
            try {
                const response = await fetch(`${API_BASE}/status`);
                const data = await response.json();
                updateStatus(data);
            } catch (error) {
                console.error('Failed to check status:', error);
            }
        }

        function updateStatus(data) {
            const wifiStatus = document.getElementById('wifi-status');
            const llmStatus = document.getElementById('llm-status');
            const dingtalkStatus = document.getElementById('dingtalk-status');
            const completeBtn = document.getElementById('complete-btn');

            const wifiConfigured = !!(data.wifi && data.wifi.configured);
            const llmConfigured = !!(data.llm && data.llm.configured);
            const dingtalkConfigured = !!(data.dingtalk && data.dingtalk.configured);

            wifiStatus.textContent = wifiConfigured ? '已配置' : '待配置';
            wifiStatus.className = 'status ' + (wifiConfigured ? 'done' : 'pending');

            llmStatus.textContent = llmConfigured ? '已配置' : '待配置';
            llmStatus.className = 'status ' + (llmConfigured ? 'done' : 'pending');

            dingtalkStatus.textContent = dingtalkConfigured ? '已配置' : '待配置';
            dingtalkStatus.className = 'status ' + (dingtalkConfigured ? 'done' : 'pending');

            completeBtn.disabled = !data.complete;

            updateConfigInfo(data);
        }

        function updateConfigInfo(data) {
            const configWifi = document.getElementById('config-wifi');
            const configLlm = document.getElementById('config-llm');
            const configDingtalk = document.getElementById('config-dingtalk');

            const wifi = data.wifi || {};
            const llm = data.llm || {};
            const dingtalk = data.dingtalk || {};

            if (wifi.configured) {
                configWifi.innerHTML = `<span style="color: #4ade80;">✓</span> ${wifi.ssid || '已配置'}`;
            } else {
                configWifi.textContent = '未配置';
            }

            if (llm.configured) {
                configLlm.innerHTML = `<span style="color: #4ade80;">✓</span> ${llm.provider || '已配置'} - ${llm.model || '未指定模型'}`;
            } else {
                configLlm.textContent = '未配置';
            }

            if (dingtalk.configured) {
                configDingtalk.innerHTML = `<span style="color: #4ade80;">✓</span> ${dingtalk.app_key || '已配置'}`;
            } else {
                configDingtalk.textContent = '未配置';
            }
        }

        async function scanWiFi() {
            const wifiList = document.getElementById('wifi-list');
            wifiList.innerHTML = '<div class="loading">扫描中...</div>';

            try {
                const response = await fetch(`${API_BASE}/wifi/scan`);
                const data = await response.json();

                if (!data.ok) {
                    wifiList.innerHTML = '<div class="loading">扫描失败</div>';
                    showError(data.msg || 'WiFi扫描失败');
                    return;
                }

                const aps = Array.isArray(data.aps) ? data.aps : [];
                wifiList.innerHTML = '';
                if (aps.length === 0) {
                    wifiList.innerHTML = '<div class="loading">未找到WiFi网络</div>';
                    return;
                }

                aps.forEach(ap => {
                    const item = document.createElement('div');
                    item.className = 'wifi-item';
                    item.innerHTML = `
                        <div class="ssid">${ap.ssid}</div>
                        <div class="signal">信号强度: ${ap.rssi} dBm</div>
                    `;
                    item.onclick = () => selectWiFi(ap);
                    wifiList.appendChild(item);
                });
            } catch (error) {
                showError('WiFi扫描失败: ' + error.message);
            }
        }

        function selectWiFi(ap) {
            document.getElementById('wifi-ssid').value = ap.ssid;
            document.getElementById('wifi-scan-section').style.display = 'none';
            document.getElementById('wifi-config-section').style.display = 'block';
        }

        function cancelWiFi() {
            document.getElementById('wifi-scan-section').style.display = 'block';
            document.getElementById('wifi-config-section').style.display = 'none';
            document.getElementById('wifi-password').value = '';
        }

        async function connectWiFi() {
            const ssid = document.getElementById('wifi-ssid').value;
            const password = document.getElementById('wifi-password').value;

            if (!password) {
                showError('请输入WiFi密码');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/wifi/connect`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ssid, password })
                });

                const data = await response.json();
                if (data.ok) {
                    showSuccess('WiFi配置已保存');
                    cancelWiFi();
                    checkStatus();
                } else {
                    showError(data.msg || 'WiFi配置失败');
                }
            } catch (error) {
                showError('WiFi配置失败: ' + error.message);
            }
        }

        async function saveLLM() {
            const provider = document.getElementById('llm-provider').value;
            const apiKey = document.getElementById('llm-api-key').value;
            const model = document.getElementById('llm-model').value;
            const baseUrl = document.getElementById('llm-base-url').value;

            if (!apiKey) {
                showError('请输入API Key');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/llm/config`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        provider,
                        api_key: apiKey,
                        model,
                        base_url: baseUrl
                    })
                });

                const data = await response.json();
                if (data.ok) {
                    showSuccess('LLM配置已保存');
                    checkStatus();
                } else {
                    showError(data.msg || 'LLM配置失败');
                }
            } catch (error) {
                showError('LLM配置失败: ' + error.message);
            }
        }

        async function saveDingTalk() {
            const appKey = document.getElementById('dingtalk-app-key').value;
            const appSecret = document.getElementById('dingtalk-app-secret').value;

            if (!appKey || !appSecret) {
                showError('请输入App Key和App Secret');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/dingtalk/config`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        app_key: appKey,
                        app_secret: appSecret
                    })
                });

                const data = await response.json();
                if (data.ok) {
                    showSuccess('钉钉配置已保存');
                    checkStatus();
                } else {
                    showError(data.msg || '钉钉配置失败');
                }
            } catch (error) {
                showError('钉钉配置失败: ' + error.message);
            }
        }

        async function completeSetup() {
            if (!confirm('确定完成配置并重启设备吗？')) {
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/setup/complete`, {
                    method: 'POST'
                });

                const data = await response.json();
                if (data.ok) {
                    showSuccess('配置完成！设备将在5秒后重启...');
                    setTimeout(() => {
                        location.reload();
                    }, 5000);
                } else {
                    showError(data.msg || '完成配置失败');
                }
            } catch (error) {
                showError('完成配置失败: ' + error.message);
            }
        }

        async function resetConfig() {
            if (!confirm('确定要重置所有配置吗？这将清除所有设置！')) {
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/setup/reset`, {
                    method: 'POST'
                });

                const data = await response.json();
                if (data.ok) {
                    showSuccess('配置已重置！设备将在5秒后重启...');
                    setTimeout(() => {
                        location.reload();
                    }, 5000);
                } else {
                    showError(data.msg || '重置配置失败');
                }
            } catch (error) {
                showError('重置配置失败: ' + error.message);
            }
        }

        function showError(message) {
            const status = document.getElementById('status');
            status.innerHTML = `<div class="error">${message}</div>`;
            setTimeout(() => {
                status.innerHTML = '';
            }, 5000);
        }

        function showSuccess(message) {
            const status = document.getElementById('status');
            status.innerHTML = `<div class="success">${message}</div>`;
            setTimeout(() => {
                status.innerHTML = '';
            }, 5000);
        }

        function addChatMessage(message, isUser) {
            const chatMessages = document.getElementById('chat-messages');
            const msgDiv = document.createElement('div');
            msgDiv.style.marginBottom = '10px';
            msgDiv.style.padding = '10px';
            msgDiv.style.borderRadius = '8px';
            msgDiv.style.background = isUser ? '#e94560' : '#0f3460';
            msgDiv.style.color = '#fff';
            msgDiv.style.maxWidth = '80%';
            msgDiv.style.marginLeft = isUser ? 'auto' : '0';
            msgDiv.textContent = message;
            chatMessages.appendChild(msgDiv);
            
            const chatContainer = document.getElementById('chat-container');
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        async function sendChat() {
            const input = document.getElementById('chat-input');
            const message = input.value.trim();
            
            if (!message) return;
            
            input.value = '';
            addChatMessage(message, true);
            
            try {
                const response = await fetch(`${API_BASE}/chat/test`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });
                
                const data = await response.json();
                if (data.ok) {
                    addChatMessage(data.response, false);
                } else {
                    addChatMessage('错误: ' + (data.msg || '对话测试失败'), false);
                }
            } catch (error) {
                addChatMessage('错误: ' + error.message, false);
            }
        }

        checkStatus();
        setInterval(checkStatus, 5000);
    </script>
</body>
</html>
